name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore, build, test
        run: |
          dotnet restore Backend.Tests/Backend.Tests.csproj
          dotnet build Backend.Tests/Backend.Tests.csproj -c Release --no-restore
          dotnet test Backend.Tests/Backend.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/TestResults/**/*.trx"
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: React/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: React/frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: false
          tags: mercantec-space-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./React/frontend
          file: ./React/frontend/Dockerfile
          push: false
          tags: mercantec-space-frontend:ci
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_AUTH_ISSUER=https://auth.example.test
            VITE_AUTH_CLIENT_ID=test-client
            VITE_AUTH_AUDIENCE=test-audience
            VITE_AUTH_SCOPES=openid profile email
            VITE_AUTH_REDIRECT_URI=https://app.example.test/callback
            VITE_AUTH_LOGOUT_RETURN_URL=https://app.example.test/
