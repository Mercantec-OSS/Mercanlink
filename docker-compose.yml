services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9301:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - DEFAULT_CONNECTION=Host=db;Port=5432;Database=appdb;Username=appuser;Password=apppassword;
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - MERCANTEC_AUTH_ISSUER=${MERCANTEC_AUTH_ISSUER:-https://auth.mercantec.tech}
      - MERCANTEC_AUTH_AUDIENCE=${MERCANTEC_AUTH_AUDIENCE:-mercantec-apps}
      - MERCANTEC_AUTH_JWKS_URI=${MERCANTEC_AUTH_JWKS_URI:-https://auth.mercantec.tech/.well-known/jwks.json}
      - DISCORD_MODCHANNELID=${DISCORD_MODCHANNELID}
      - DISCORD_KNOWLEDGECENTERCHANNELID=${DISCORD_KNOWLEDGECENTERCHANNELID}
      - DISCORD_MODROLEID=${DISCORD_MODROLEID}
      - DISCORD_LURKRAPIKEY=${DISCORD_LURKRAPIKEY}
      - DISCORD_SERVERID=${DISCORD_SERVERID}
      - XP_REWARD_SECRET_CODE=${XP_REWARD_SECRET_CODE}
      - DISCORD_HEALTH_STALE_SECONDS=${DISCORD_HEALTH_STALE_SECONDS:-180}
      - DISCORD_EVENTCHANNELID=${DISCORD_EVENTCHANNELID}
      - EVENTS_EDU_EMAIL_REGEX=${EVENTS_EDU_EMAIL_REGEX}
      - ADMIN_DISCORD_IDS=${ADMIN_DISCORD_IDS}
      - S3Media__Endpoint=http://minio:9000
      - S3Media__PublicBaseUrl=${S3_PUBLIC_BASE_URL:-http://localhost:9305}
      - S3Media__AccessKey=${MINIO_ROOT_USER:-minioadmin}
      - S3Media__SecretKey=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - S3Media__Bucket=events-media
      - S3Media__Region=us-east-1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - app-network

  frontend:
    build:
      context: ./React/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_AUTH_ISSUER: ${VITE_AUTH_ISSUER:-https://auth.mercantec.tech}
        VITE_AUTH_CLIENT_ID: ${VITE_AUTH_CLIENT_ID:-mercantec}
        VITE_AUTH_AUDIENCE: ${VITE_AUTH_AUDIENCE:-mercantec-apps}
        VITE_AUTH_SCOPES: ${VITE_AUTH_SCOPES:-openid profile email}
        VITE_AUTH_REDIRECT_URI: ${VITE_AUTH_REDIRECT_URI:-https://mercanlink.dk/auth/callback}
        VITE_AUTH_LOGOUT_RETURN_URL: ${VITE_AUTH_LOGOUT_RETURN_URL:-https://mercanlink.dk/login}
    ports:
      - "9302:80"
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # Let web-UI til Postgres (tabeller + SQL) — samme creds som `db`-servicen
  pgweb:
    image: sosedoff/pgweb:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://appuser:apppassword@db:5432/appdb?sslmode=disable
    ports:
      - "9304:8081"
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9305:9000"
      - "9306:9001"
    networks:
      - app-network

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    entrypoint:
      - /bin/sh
      - -c
      - >-
        sleep 5 &&
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb local/events-media --ignore-existing &&
        mc anonymous set download local/events-media
    networks:
      - app-network

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    ports:
      - "9303:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  uptime_kuma_data:
  minio_data: